<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Logo Final Preview</title>
    <style>
        :root {
            --dark-bg: #0a0a0a;
            --dark-stroke: #ffffff;
            --light-bg: #f8f8f8;
            --light-stroke: #1a1a1a;
        }
        body {
            margin: 0;
            display: flex;
            flex-direction: row;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .view-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .dark-mode {
            background-color: var(--dark-bg);
            color: var(--dark-stroke);
        }
        .light-mode {
            background-color: var(--light-bg);
            color: var(--light-stroke);
            border-left: 1px solid #e0e0e0;
        }
        .label {
            position: absolute;
            top: 30px;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
            opacity: 0.6;
        }
        .logo-box {
            width: 320px;
            height: 320px;
        }
        svg {
            width: 100%;
            height: 100%;
        }
        .description {
            margin-top: 24px;
            font-size: 13px;
            font-weight: 300;
            letter-spacing: -0.02em;
            text-align: center;
            line-height: 1.6;
            max-width: 200px;
        }
    </style>
</head>
<body>

    <!-- 다크 모드 프리뷰 -->
    <div class="view-container dark-mode">
        <div class="label">Dark Mode</div>
        <div class="logo-box">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <!-- 1. IDEA (The Core): 최종 결정된 이등변 삼각형 좌표 -->
                <polygon 
                    points="50,43.5 41.2,56.2 58.8,56.2" 
                    fill="none" 
                    stroke="var(--dark-stroke)" 
                    stroke-width="1.4" 
                    stroke-linejoin="round"
                />
                <!-- 2. INTERNAL LAYER: 분석의 층 (견고한 실선) -->
                <path 
                    d="M 35.5 67.5 A 20.5 20.5 0 1 1 64.5 67.5" 
                    fill="none" 
                    stroke="var(--dark-stroke)" 
                    stroke-width="0.9" 
                    stroke-opacity="0.85"
                    stroke-linecap="round"
                />
                <!-- 3. EXTERNAL LAYER: 현상의 층 (단절된 아크, 불투명도 0.46) -->
                <path 
                    d="M 28 78 A 33 33 0 1 1 72 78" 
                    fill="none" 
                    stroke="var(--dark-stroke)" 
                    stroke-width="0.45" 
                    stroke-opacity="0.46"
                    stroke-dasharray="32 10 38 12 12 6" 
                    stroke-linecap="round"
                />
            </svg>
        </div>
        <div class="description">어둠 속에서 발견한<br>명확한 통찰의 에너지</div>
    </div>

    <!-- 라이트 모드 프리뷰 -->
    <div class="view-container light-mode">
        <div class="label">Light Mode</div>
        <div class="logo-box">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <!-- 1. IDEA (The Core): 최종 결정된 이등변 삼각형 좌표 -->
                <polygon 
                    points="50,43.5 41.2,56.2 58.8,56.2" 
                    fill="none" 
                    stroke="var(--light-stroke)" 
                    stroke-width="1.4" 
                    stroke-linejoin="round"
                />
                <!-- 2. INTERNAL LAYER: 분석의 층 (견고한 실선) -->
                <path 
                    d="M 35.5 67.5 A 20.5 20.5 0 1 1 64.5 67.5" 
                    fill="none" 
                    stroke="var(--light-stroke)" 
                    stroke-width="0.9" 
                    stroke-opacity="0.8"
                    stroke-linecap="round"
                />
                <!-- 3. EXTERNAL LAYER: 현상의 층 (단절된 아크, 불투명도 0.38) -->
                <path 
                    d="M 28 78 A 33 33 0 1 1 72 78" 
                    fill="none" 
                    stroke="var(--light-stroke)" 
                    stroke-width="0.45" 
                    stroke-opacity="0.38"
                    stroke-dasharray="32 10 38 12 12 6" 
                    stroke-linecap="round"
                />
            </svg>
        </div>
        <div class="description">정밀한 분석이 설계한<br>압도적 신뢰의 가치</div>
    </div>

</body>
</html>
